<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Arya Surf Camp</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/open-location-code@1.0.4/openlocationcode.min.js"></script>
<style>
:root{
  --sea:#1a4a3a; --wave:#2d7a5c; --sand:#f0ede8; --foam:#fafaf8;
  --sun:#e6a817; --coral:#c0392b; --sky:#1a5276;
  --txt:#1a1a1a; --muted:#888; --border:#e0dbd4;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--sand);min-height:100vh;color:var(--txt);}

/* ── HEADER ── */
.hdr{
  background:linear-gradient(135deg,var(--sea),var(--wave));
  padding:14px 18px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}
.hdr-logo{font-family:'Playfair Display',serif;color:#f0e6d3;font-size:18px;letter-spacing:.5px;}
.hdr-sub{color:#a8c5b5;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.hdr-badge{margin-left:auto;background:rgba(255,255,255,.15);color:#f0e6d3;
  border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;}

/* ── LAYOUT ── */
.wrap{padding:16px;max-width:520px;margin:0 auto;padding-bottom:40px;}

/* ── BOARD CARD ── */
.board-chip{
  border-radius:16px;overflow:hidden;
  box-shadow:0 3px 16px rgba(0,0,0,.12);margin-bottom:14px;
}
.chip-head{padding:16px 18px;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.chip-head.available   {background:linear-gradient(135deg,#1a7a40,#27ae60);}
.chip-head.pending     {background:linear-gradient(135deg,#d35400,#e67e22);}
.chip-head.rented      {background:linear-gradient(135deg,#7a5c00,#b8860b);}
.chip-head.at_spot     {background:linear-gradient(135deg,var(--sky),#2980b9);}
.chip-head.with_guide  {background:linear-gradient(135deg,#1a3a5c,#2471a3);}
.chip-head.back_camp   {background:linear-gradient(135deg,#117a65,#1abc9c);}
.chip-head.overdue     {background:linear-gradient(135deg,#922b21,var(--coral));}
.chip-head.maintenance {background:linear-gradient(135deg,#4a235a,#7d3c98);}
.board-id{font-family:'Playfair Display',serif;font-size:26px;letter-spacing:1px;}
.board-sub{color:rgba(255,255,255,.75);font-size:12px;margin-top:2px;}
.status-pill{background:rgba(255,255,255,.2);padding:5px 13px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}

.chip-body{background:#fff;padding:16px 18px;}

/* ── INFO ROWS ── */
.info-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid #f0ede8;font-size:13px;}
.info-row:last-child{border:none;padding-bottom:0;}
.info-label{color:var(--muted);}
.info-val{font-weight:600;color:var(--txt);}

/* ── RENTER BOX ── */
.renter-box{
  background:#fff9ec;border-left:4px solid var(--sun);
  border-radius:0 10px 10px 0;padding:12px 14px;margin:10px 0;
}
.renter-name{font-weight:700;font-size:16px;color:var(--sea);}
.renter-det{font-size:12px;color:#666;line-height:1.7;margin-top:3px;}

/* ── OVERDUE ALERT ── */
.overdue-alert{
  background:#fde8e8;border-radius:10px;padding:12px 14px;
  margin:10px 0;color:var(--coral);font-weight:700;font-size:13px;line-height:1.6;
  border:1px solid #f5c6cb;
}

/* ── SECTION CARD ── */
.scard{background:#fff;border-radius:14px;padding:18px;
  box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:12px;}
.scard-title{font-weight:700;font-size:14px;color:var(--sea);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;}

/* ── FORM ELEMENTS ── */
label{display:block;font-size:11px;font-weight:700;color:#666;
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
input[type=text],input[type=tel],input[type=number],select,textarea{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);
  border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;
  background:var(--foam);color:var(--txt);outline:none;margin-bottom:12px;
  transition:border-color .15s;-webkit-appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--sea);}
textarea{resize:vertical;min-height:80px;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid2 > div{position:relative;}

/* ── PACKAGE TOGGLES ── */
.pkg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.pkg-btn{
  border:2px solid var(--border);border-radius:12px;padding:12px 10px;
  text-align:center;cursor:pointer;background:#fff;transition:all .15s;
  user-select:none;
}
.pkg-btn.on{border-color:var(--sea);background:#e8f5ec;}
.pkg-btn .pkg-icon{font-size:22px;margin-bottom:5px;}
.pkg-btn .pkg-name{font-size:12px;font-weight:700;color:var(--txt);}
.pkg-btn .pkg-price{font-size:10px;color:var(--muted);margin-top:2px;}
.pkg-btn.on .pkg-name{color:var(--sea);}

/* ── ACTION BTNS (guide view) ── */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.act-btn{
  border:2px solid var(--border);border-radius:12px;padding:13px 8px;
  text-align:center;cursor:pointer;background:#fff;transition:all .15s;
  user-select:none;
}
.act-btn.on{border-color:var(--sky);background:#e8f4fd;}
.act-btn .act-icon{font-size:22px;margin-bottom:5px;}
.act-btn .act-name{font-size:12px;font-weight:700;color:var(--txt);}
.act-btn.on .act-name{color:var(--sky);}

/* ── CONDITION SELECTOR ── */
.cond-row{display:flex;gap:8px;margin-bottom:12px;}
.cond-btn{flex:1;border:2px solid var(--border);border-radius:10px;padding:9px;
  text-align:center;cursor:pointer;font-size:12px;font-weight:700;
  color:var(--muted);transition:all .15s;}
.cond-btn.on-good   {border-color:#1a7a40;background:#e8f5ec;color:#1a7a40;}
.cond-btn.on-minor  {border-color:#d35400;background:#fef3e7;color:#d35400;}
.cond-btn.on-repair {border-color:var(--coral);background:#fde8e8;color:var(--coral);}

/* ── TERMS BOX ── */
.terms-box{
  background:#fffef8;border:1px solid #e8dfc8;border-radius:10px;
  padding:14px;max-height:160px;overflow-y:auto;
  font-size:11px;color:#555;line-height:1.75;margin-bottom:12px;
}

/* ── COST SUMMARY ── */
.cost-box{background:var(--sand);border-radius:10px;padding:14px 16px;margin-bottom:14px;}
.cost-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
.cost-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;
  color:var(--sea);padding-top:8px;border-top:1px solid var(--border);margin-top:6px;}

/* ── BUTTONS ── */
.btn{width:100%;border:none;border-radius:12px;padding:15px;font-size:15px;
  font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn:active{opacity:.85;}
.btn-primary{background:linear-gradient(135deg,var(--sea),var(--wave));color:#fff;}
.btn-orange {background:linear-gradient(135deg,#d35400,#e67e22);color:#fff;}
.btn-sky    {background:linear-gradient(135deg,var(--sky),#2980b9);color:#fff;margin-bottom:8px;}
.btn-return {background:linear-gradient(135deg,#922b21,var(--coral));color:#fff;}
.btn-sm{width:auto;padding:8px 18px;font-size:13px;}

/* ── TABS ── */
.tabs{display:flex;background:#f0ede8;border-radius:10px;padding:4px;margin-bottom:16px;}
.tab{flex:1;padding:9px;border:none;border-radius:8px;font-weight:700;font-size:13px;
  cursor:pointer;background:transparent;color:var(--muted);transition:all .2s;
  font-family:'DM Sans',sans-serif;}
.tab.active{background:#fff;color:var(--sea);box-shadow:0 1px 4px rgba(0,0,0,.1);}

/* ── LOG ── */
.log-item{padding:10px 0;border-bottom:1px solid #f0ede8;display:flex;gap:10px;align-items:flex-start;}
.log-item:last-child{border:none;padding-bottom:0;}
.log-dot{width:8px;height:8px;border-radius:50%;background:var(--wave);flex-shrink:0;margin-top:4px;}
.log-act{font-size:12px;font-weight:700;color:var(--sea);}
.log-det{font-size:11px;color:var(--muted);line-height:1.5;}
.log-time{font-size:10px;color:#bbb;white-space:nowrap;margin-left:auto;flex-shrink:0;}

/* ── DIVIDER ── */
.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}

/* ── CHECKBOX ROW ── */
.chk-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;}
.chk-row input{width:18px;height:18px;cursor:pointer;accent-color:var(--sea);}
.chk-row span{font-size:13px;color:var(--txt);}

/* ── TOAST ── */
.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  padding:12px 22px;border-radius:12px;font-weight:700;font-size:13px;
  box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:9999;
  white-space:nowrap;max-width:88vw;pointer-events:none;
  opacity:0;transition:opacity .3s;
}
.toast.show{opacity:1;}
.toast.ok  {background:var(--wave);color:#fff;}
.toast.err {background:var(--coral);color:#fff;}

/* ── SPINNER ── */
.spinner{text-align:center;padding:48px;color:var(--wave);font-size:14px;}
.spin-ring{display:inline-block;width:28px;height:28px;border:3px solid #e0dbd4;
  border-top-color:var(--wave);border-radius:50%;animation:spin .7s linear infinite;
  margin-bottom:10px;display:block;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── HOME ── */
.home-hero{text-align:center;padding:36px 16px 24px;}
.home-hero h1{font-family:'Playfair Display',serif;font-size:28px;color:var(--sea);margin-bottom:6px;}
.home-hero p{color:var(--muted);font-size:14px;}
.how-card{background:#fff;border-radius:14px;padding:18px;
  box-shadow:0 2px 10px rgba(0,0,0,.06);}
.how-step{display:flex;align-items:center;gap:14px;padding:10px 0;
  border-bottom:1px solid #f5f2ed;font-size:13px;color:#444;}
.how-step:last-child{border:none;padding-bottom:0;}
.how-num{width:28px;height:28px;border-radius:50%;background:var(--sea);
  color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;}
</style>
</head>
<body>

<div class="hdr">
  <div style="font-size:26px">🏄</div>
  <div>
    <div class="hdr-logo">Arya Surf Camp</div>
    <div class="hdr-sub">Cimaja Beach · Board Tracker</div>
  </div>
  <div class="hdr-badge" id="hdrbadge" style="display:none"></div>
</div>

<div id="toast" class="toast"></div>
<div class="wrap" id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// ARYA SURF CAMP — Board Tracker
// Hosted on GitHub Pages. Data API: Google Apps Script (doPost)
//
// ▼ PASTE YOUR APPS SCRIPT /exec URL HERE ▼
const API_URL = 'https://script.google.com/macros/s/AKfycbwbaTMe7Tz3kZTnYGK29ZGf8R28wOko9BrcuHLuUxTs5p_d8DtU7xsOw2k3rzDCRWr8_A/exec';
// ▲ replace with your own URL if you redeploy ▲
// ═══════════════════════════════════════════════════════════════

const fmt   = n => 'Rp '+Number(n).toLocaleString('id-ID');
const fmtDt = d => d ? new Date(d).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
const fmtT  = d => d ? new Date(d).toLocaleString('en-GB',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'}) : '—';

const STATUS_LABEL = {
  available:'✓ Available', pending_checkout:'⏳ Awaiting Checkout',
  rented:'🏄 Rented Out', at_spot:'🌊 At Surf Spot',
  with_guide:'🧑‍🏫 With Guide', back_camp:'⛺ Back at Camp',
  overdue:'⚠ OVERDUE', maintenance:'🔧 In Repair', returned:'↩ Returned'
};

let RAW = {}, CFG = {};
const app = document.getElementById('app');

// ── API CALL ──────────────────────────────────────────────────
// fetch() to Apps Script doPost — works from any domain (GitHub Pages)
// Apps Script redirect is fine here because we're fetching data, not navigating
async function api(payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
    headers: { 'Content-Type': 'text/plain' } // text/plain avoids CORS preflight
  });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || 'Server error');
  return json.data;
}

function showLoading(msg) {
  app.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:60px 24px;gap:18px">
      <div style="width:48px;height:48px;border:5px solid #e0e0e0;
        border-top-color:var(--sea);border-radius:50%;
        animation:spin 0.9s linear infinite"></div>
      <div style="color:var(--sea);font-weight:600;font-size:15px">${msg||'Loading…'}</div>
    </div>`;
}

function showErr(msg) {
  app.innerHTML = `
    <div style="padding:32px 24px;text-align:center">
      <div style="font-size:40px;margin-bottom:14px">⚠️</div>
      <div style="color:#c0392b;font-weight:700;font-size:16px;margin-bottom:10px">Something went wrong</div>
      <div style="color:#666;font-size:13px;margin-bottom:20px;line-height:1.6">${msg}</div>
      <button onclick="location.reload()" style="background:var(--sea);color:#fff;
        border:none;border-radius:10px;padding:12px 28px;font-size:14px;
        font-weight:700;cursor:pointer">🔄 Try Again</button>
    </div>`;
}

window.onload = async () => {
  const hash = (window.location.hash || '').replace('#','').toUpperCase().trim();

  if (!hash)           { renderHome(); return; }
  if (hash === 'SCAN') { renderScanner(); return; }

  showLoading(hash === 'DASHBOARD' ? 'Loading dashboard…' : 'Loading board ' + hash + '…');

  try {
    if (hash === 'DASHBOARD') {
      const data = await api({ action: 'getDashboardData' });
      renderDashboard(data);
    } else {
      const data = await api({ action: 'getBoardData', boardId: hash });
      RAW = data; CFG = RAW.config || {};
      const v = RAW.view;
      if      (v === 'rental_form')  renderRentalForm();
      else if (v === 'checkout')     renderCheckout();
      else if (v === 'active')       renderActive();
      else if (v === 'maintenance')  renderMaintenance();
      else if (v === 'error')        renderError();
      else                           renderHome();
    }
  } catch(err) {
    showErr('Could not reach the server.<br><br><code style="font-size:11px">' +
      err.message + '</code><br><br>' +
      'Check that the API_URL in the HTML matches your Apps Script /exec URL.');
  }
};

// ── SHARED BOARD CHIP ─────────────────────────────────────────
function boardChip(b) {
  const due = b.returnDue ? new Date(b.returnDue) : null;
  const isOD = due && due < new Date() && !['available','returned','maintenance'].includes(b.status);
  const cssCls = isOD ? 'overdue' : b.status;
  let html = `<div class="board-chip">
    <div class="chip-head ${cssCls}">
      <div>
        <div class="board-id">${b.id}</div>
        <div class="board-sub">${b.size} · ${b.type}</div>
      </div>
      <div class="status-pill">${STATUS_LABEL[b.status]||b.status}</div>
    </div>
    <div class="chip-body">`;

  if (b.renter) html += `<div class="renter-box">
    <div class="renter-name">👤 ${b.renter}</div>
    <div class="renter-det">📞 ${b.phone||'—'}&nbsp;&nbsp;|&nbsp;&nbsp;🗓 Due: ${fmtDt(b.returnDue)}</div>
  </div>`;

  if (isOD) html += `<div class="overdue-alert">
    ⚠ OVERDUE since ${fmtDt(b.returnDue)}<br>
    Contact renter immediately: ${b.phone||'—'}
  </div>`;

  if (b.location) html += `<div class="info-row"><span class="info-label">📍 Last Location</span><span class="info-val">${b.location}</span></div>`;
  if (b.day)      html += `<div class="info-row"><span class="info-label">📅 Rental Day</span><span class="info-val">Day ${b.day}</span></div>`;
  if (b.condition && b.condition !== 'good') html += `<div class="info-row"><span class="info-label">🔍 Condition</span><span class="info-val" style="color:var(--coral)">${b.condition}</span></div>`;
  if (b.lastScan) html += `<div class="info-row"><span class="info-label">🕐 Last Scan</span><span class="info-val">${fmtT(b.lastScan)}</span></div>`;

  html += `</div></div>`;
  return html;
}

// ── LOG HTML ──────────────────────────────────────────────────
function logsHtml(logs) {
  if (!logs || !logs.length) return `<div style="text-align:center;color:var(--muted);font-size:13px;padding:16px 0">No activity recorded yet.</div>`;
  const actionLabel = {
    rental_requested:'📋 Rental Form Submitted', checked_out:'✅ Checked Out',
    at_spot:'🌊 At Surf Spot', with_guide:'🧑‍🏫 With Guide',
    back_camp:'⛺ Back at Camp', returned:'↩ Returned',
    damage_noted:'⚠ Damage Noted', needs_repair:'🔧 Needs Repair'
  };
  return logs.map(l => {
    const mapsLink = l.lat && l.lng
      ? ` <a href="https://maps.google.com/?q=${l.lat},${l.lng}" target="_blank"
           style="color:var(--wave);font-size:10px;font-weight:700;text-decoration:none;
           background:#e8f5ec;padding:2px 7px;border-radius:8px">🗺 Map</a>`
      : '';
    const w3wLink = l.w3w
      ? ` <a href="${l.w3wUrl||'https://maps.google.com/?q='+encodeURIComponent(l.w3w)}" target="_blank"
           style="color:#1a5276;font-size:10px;font-weight:700;text-decoration:none;
           background:#e8f4fd;padding:2px 7px;border-radius:8px">📍 ${l.w3w}</a>`
      : '';
    const gpsLine = l.lat
      ? `<div style="font-size:10px;color:var(--muted);font-family:monospace;margin-top:3px">
           📡 ${l.lat}, ${l.lng}${l.gpsAccuracy?' ±'+l.gpsAccuracy+'m':''}${mapsLink}${w3wLink}
         </div>`
      : '';
    return `<div class="log-item">
    <div class="log-dot"></div>
    <div style="flex:1">
      <div class="log-act">${actionLabel[l.action]||l.action}</div>
      <div class="log-det">${l.location||''}${l.day?' · Day '+l.day:''}${l.staff?' · '+l.staff:''}${l.notes?' — '+l.notes:''}</div>
      ${gpsLine}
    </div>
    <div class="log-time">${fmtT(l.time)}</div>
  </div>`;
  }).join('');
}

// ── SCREEN 1: RENTAL FORM (board = available) ─────────────────
function renderRentalForm() {
  const b = RAW.board;
  document.getElementById('hdrbadge').textContent = b.id;
  document.getElementById('hdrbadge').style.display = 'block';

  let spots = (CFG.SURF_SPOTS||[]).map(s=>`<option>${s}</option>`).join('');
  let pkg = { wax:false, rashguard:false, leash:false, ding:false };

  app.innerHTML = boardChip(b) + `
  <div class="scard">
    <div class="scard-title">📋 Surfboard Rental Agreement<span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:auto">Arya Surf Camp</span></div>

    <label>Full Name <span style="color:var(--coral)">*</span></label>
    <input type="text" id="f-name" placeholder="As per passport or ID">

    <label>Passport / ID Number <span style="color:var(--coral)">*</span></label>
    <input type="text" id="f-passport" placeholder="e.g. A1234567 or NIK">

    <div class="grid2">
      <div>
        <label>Phone Number <span style="color:var(--coral)">*</span></label>
        <input type="tel" id="f-phone" placeholder="+62 or local">
      </div>
      <div>
        <label>Rental Days <span style="color:var(--coral)">*</span></label>
        <input type="number" id="f-days" min="1" max="30" value="1" placeholder="1">
      </div>
    </div>

    <label>Home Address</label>
    <input type="text" id="f-homeaddr" placeholder="Permanent home address">

    <label>Vacation Address / Hotel</label>
    <input type="text" id="f-vacaddr" placeholder="Where you are staying in Cimaja">

    <hr class="divider">
    <div style="font-weight:700;font-size:13px;color:var(--sea);margin-bottom:10px">📦 Add-on Packages</div>
    <div class="pkg-grid" id="pkg-grid">
      <div class="pkg-btn" id="pkg-wax" onclick="togglePkg('wax')">
        <div class="pkg-icon">🕯️</div>
        <div class="pkg-name">Wax</div>
        <div class="pkg-price">+ Rp 100.000</div>
      </div>
      <div class="pkg-btn" id="pkg-rashguard" onclick="togglePkg('rashguard')">
        <div class="pkg-icon">👕</div>
        <div class="pkg-name">Rash Guard</div>
        <div class="pkg-price">Included</div>
      </div>
      <div class="pkg-btn" id="pkg-leash" onclick="togglePkg('leash')">
        <div class="pkg-icon">🔗</div>
        <div class="pkg-name">Leash</div>

    </div>

    <div class="cost-box" id="cost-box">

      <div class="cost-row" id="c-wax-row" style="display:none"><span>Wax</span><span>Rp 100.000</span></div>
      <div class="cost-total"><span>TOTAL</span><span id="c-total">Rp 75.000</span></div>

    <div class="terms-box">
      <strong>Arya Surf Camp Rental Agreement</strong><br><br>
      I hereby state that I am at least 18 years of age. I am renting a surfboard from Arya Surf Camp and agree to the following:<br><br>
      <strong>Return:</strong> Daily rentals must be returned within 24 hours. Rentals over one day must be returned by 5 PM on the last day. Failure to return on time results in an extra day's rental charge plus Rp 75.000 late fee.<br><br>
      <strong>Exclusions:</strong> Rental does not include wetsuit, fastening belts for car transport, or insurance.<br><br>
      <strong>Damage charges:</strong> Board severe damage/loss/theft = USD 100 per board. Partial damage = Rp 300.000–Rp 1.000.000. Leash loss/theft = Rp 150.000. Fins damage = Rp 50.000–Rp 150.000.<br><br>
      <strong>Theft:</strong> If equipment is not returned within 24 hours after the return date without notice, it will be reported to police as theft.<br><br>
      <strong>Safety:</strong> I declare I am in good health and understand surfing is inherently dangerous. I understand this board is not a flotation device. This contract is subject to Indonesian Law.

    <label class="chk-row" style="margin-bottom:16px">
      <input type="checkbox" id="f-terms">
      <span>I have read and agree to all rental terms above</span>
    </label>

    <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:10px">
      The rental keeper will prepare your equipment and confirm checkout.
    </div>
  </div>`;

  // Live cost calc
  function recalc() {
    const days = parseInt(document.getElementById('f-days').value)||1;
    const bc = days >= 5
      ? (Math.floor(days/5)*300000 + (days%5)*75000)
      : days * 75000;
    document.getElementById('c-board').textContent = 'Rp '+bc.toLocaleString('id-ID')+' ('+days+' day'+(days>1?'s':'')+')';
    const wax = pkg.wax ? 100000 : 0;
    document.getElementById('c-wax-row').style.display = pkg.wax ? '' : 'none';
    document.getElementById('c-total').textContent = 'Rp '+(bc+wax).toLocaleString('id-ID');
  }
  document.getElementById('f-days').addEventListener('input', recalc);
  recalc();

  window.togglePkg = function(key) {
    pkg[key] = !pkg[key];
    document.getElementById('pkg-'+key).classList.toggle('on', pkg[key]);
    recalc();
  };

  window.submitRental = async function() {
    const name     = document.getElementById('f-name').value.trim();
    const passport = document.getElementById('f-passport').value.trim();
    const phone    = document.getElementById('f-phone').value.trim();
    const days     = parseInt(document.getElementById('f-days').value)||1;
    const homeAddr = document.getElementById('f-homeaddr').value.trim();
    const vacAddr  = document.getElementById('f-vacaddr').value.trim();
    const terms    = document.getElementById('f-terms').checked;

    if (!name)     { toast('⚠ Please enter your full name','err'); return; }
    if (!passport) { toast('⚠ Please enter your Passport / ID number','err'); return; }
    if (!phone)    { toast('⚠ Please enter your phone number','err'); return; }
    if (!terms)    { toast('⚠ Please agree to the rental terms','err'); return; }

    const btn = document.querySelector('.btn-primary');
    btn.disabled = true; btn.textContent = 'Submitting…';

    api({ action:'submitRental', boardId: b.id, name, passport, phone,
      homeAddr, vacAddr, days,
      wax: pkg.wax, rashguard: pkg.rashguard, leash: pkg.leash, ding: pkg.ding })
      .then(() => {
        toast('✅ Rental request submitted! The keeper will prepare your gear.','ok');
        setTimeout(() => location.reload(true), 2200);
      })
      .catch(err => {
        toast('⚠ '+err.message,'err');
        btn.disabled = false; btn.textContent = '🏄 Submit Rental Request';
      });
  };
}

        </div>
        <div class="act-btn" id="act-rented" onclick="pickAction('rented',this)">

        </div>

      <label>📍 Quick-pick a common spot</label>
      <select id="g-loc-preset" onchange="applyPreset(this.value)">
        <option value="">— Select a preset spot (optional) —</option>${spots}
      </select>

      <label>✏️ Surf Spot Name <span style="color:var(--coral)">*</span></label>
      <input type="text" id="g-loc" placeholder="Type the exact spot name (e.g. Cimaja Reef Left)" autocomplete="off">
      <div style="font-size:11px;color:var(--muted);margin-top:-8px;margin-bottom:12px">You can type a custom name or pick from the list above</div>

      <label>📡 GPS Coordinates</label>
      <div id="gps-box" style="display:flex;align-items:center;gap:10px;margin-bottom:12px;
        background:#f0f8f4;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;">
        <div id="gps-dot" style="width:10px;height:10px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background .3s"></div>
        <div style="flex:1">
          <div id="gps-label" style="font-size:12px;font-weight:600;color:var(--muted)">Tap the button to capture GPS</div>
          <div id="gps-coords" style="font-size:11px;color:var(--muted);margin-top:1px;font-family:monospace"></div>
        </div>
        <button type="button" onclick="captureGPS()" id="gps-btn"
          style="border:none;background:var(--wave);color:#fff;border-radius:8px;
          padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0">
          📡 Get GPS
        </button>
      </div>

      <div class="grid2">
        <div>
          <label>📅 Rental Day #</label>
          <input type="number" id="g-day" min="1" max="30" value="${b.day||''}" placeholder="1,2,3…">
        </div>
        <div>
          <label>👤 Your Name <span style="color:var(--coral)">*</span></label>
          <input type="text" id="g-staff" placeholder="Guide / Staff name">
        </div>
      </div>

      <label>🔍 Board Condition</label>
      <div class="cond-row">
        <div class="cond-btn on-good" id="cond-good" onclick="pickCond('good')">✓ Good</div>
        <div class="cond-btn" id="cond-minor" onclick="pickCond('minor')">⚡ Minor</div>

      </div>

      <label>📝 Notes (damage, conditions, etc.)</label>
      <textarea id="g-notes" placeholder="Describe any damage, scratch location, sea conditions, etc."></textarea>

      <button class="btn btn-sky" onclick="doGuideUpdate()">📍 Update Location & Condition</button>
    </div>

    <!-- RETURN TAB -->
    <div id="pane-return" style="display:none">
      ${r ? `<div class="renter-box">
        <div class="renter-name">${r.name}</div>

          📋 ${r.rentalId}<br>

          🗓 Rented: ${fmtT(r.timestamp)} · Due: ${fmtDt(r.returnDue)}
        </div>
      </div>` : ''}

      <div style="font-weight:700;font-size:13px;color:var(--sea);margin-bottom:8px">🔍 Board condition on return</div>
      <div class="cond-row">
        <div class="cond-btn on-good" id="rcond-good" onclick="pickRetCond('good')">✓ Good</div>
        <div class="cond-btn" id="rcond-minor" onclick="pickRetCond('minor')">⚡ Scratched</div>

    <div class="scard-title">📋 Activity Log</div>
    ${logsHtml(RAW.logs)}
  </div>`;

  // Pre-select current action
  if (b.status && document.getElementById('act-'+b.status)) {
    document.getElementById('act-'+b.status).classList.add('on');
    selAction = b.status;
  }

  window.switchTab = function(t) {
    document.getElementById('tab-guide').classList.toggle('active', t==='guide');
    document.getElementById('tab-return').classList.toggle('active', t==='return');
    document.getElementById('pane-guide').style.display  = t==='guide'  ? '':'none';
    document.getElementById('pane-return').style.display = t==='return' ? '':'none';
  };

  window.pickAction = function(a, el) {
    document.querySelectorAll('.act-btn').forEach(b=>b.classList.remove('on'));
    el.classList.add('on'); selAction = a;
  };

  window.pickCond = function(c) {
    ['good','minor','repair'].forEach(x=>document.getElementById('cond-'+x).className='cond-btn');
    document.getElementById('cond-'+c).classList.add('on-'+c);
    selCond = c;
  };

  let retCond = 'good';
  window.pickRetCond = function(c) {
    ['good','minor','repair'].forEach(x=>document.getElementById('rcond-'+x).className='cond-btn');
    document.getElementById('rcond-'+c).classList.add('on-'+c);
    retCond = c;
  };

  // GPS state
  let gpsLat = '', gpsLng = '', gpsAcc = '', plusCode = '', plusCodeUrl = '';

  window.applyPreset = function(val) {
    if (val) document.getElementById('g-loc').value = val;
  };

  window.captureGPS = function() {
    if (!navigator.geolocation) {
      setGPS('unsupported','GPS not supported on this device','','');
      return;
    }
    setGPS('getting','Getting your GPS position…','','');
    document.getElementById('gps-btn').disabled = true;
    navigator.geolocation.getCurrentPosition(
      pos => {
        gpsLat = pos.coords.latitude.toFixed(6);
        gpsLng = pos.coords.longitude.toFixed(6);
        gpsAcc = Math.round(pos.coords.accuracy);

        // Calculate Google Plus Code in the browser — no API, no cost
        try {
          plusCode    = OpenLocationCode.encode(parseFloat(gpsLat), parseFloat(gpsLng));
          plusCodeUrl = 'https://maps.google.com/?q=' + encodeURIComponent(plusCode);
        } catch(e) {
          plusCode = ''; plusCodeUrl = '';
        }

        setGPS('got',
          '✓ Location captured (±' + gpsAcc + ' m)',
          gpsLat + ', ' + gpsLng + (plusCode ? '  📍 ' + plusCode : ''),
          'got'
        );
        document.getElementById('gps-btn').disabled = false;
        document.getElementById('gps-btn').textContent = '🔄 Refresh';
      },
      err => {
        const msgs = {1:'Permission denied — allow location in browser settings',
                      2:'Position unavailable — try outdoors',3:'Timed out — try again'};
        setGPS('err', msgs[err.code]||'GPS error','','');
        document.getElementById('gps-btn').disabled = false;
        gpsLat = ''; gpsLng = ''; plusCode = ''; plusCodeUrl = '';
      },
      { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
    );
  };

  function setGPS(state, label, coords, dot) {
    const colors = { got:'#1a7a40', getting:'#e6a817', err:'#c0392b', unsupported:'#888' };
    document.getElementById('gps-dot').style.background = colors[state] || '#ccc';
    document.getElementById('gps-label').textContent = label;
    document.getElementById('gps-label').style.color = colors[state] || '#888';
    document.getElementById('gps-coords').textContent = coords;
  }

  window.doGuideUpdate = async function() {
    const loc   = document.getElementById('g-loc').value.trim();
    const day   = document.getElementById('g-day').value;
    const staff = document.getElementById('g-staff').value.trim();
    const notes = document.getElementById('g-notes').value.trim();
    if (!selAction) { toast('⚠ Select a board status','err'); return; }
    if (!loc)       { toast('⚠ Enter the surf spot name','err'); return; }
    if (!staff)     { toast('⚠ Enter your name','err'); return; }

    const btn = document.querySelector('.btn-sky');
    btn.disabled = true; btn.textContent = 'Saving…';

    api({ action:'updateActivity', boardId: b.id, boardStatus: selAction,
      location: loc, lat: gpsLat, lng: gpsLng, gpsAccuracy: gpsAcc,
      w3w: plusCode, w3wUrl: plusCodeUrl,
      day, staff, notes, condition: selCond, renter: b.renter })
      .then(() => {
        toast('✅ Board location updated!','ok');
        setTimeout(()=>location.reload(true), 1800);
      })
      .catch(err => {
        toast('⚠ '+err.message,'err');
        btn.disabled=false; btn.textContent='📍 Update Location & Condition';
      });
  };

  window.doReturn = function() {
    const staff = document.getElementById('r-staff').value.trim();
    const notes = document.getElementById('r-notes').value.trim();
    if (!staff) { toast('⚠ Enter your name','err'); return; }
    if (!confirm('Confirm: mark '+b.id+' as returned?\nThis will close the rental and make the board available.')) return;
    const btn = document.querySelector('.btn-return');
    btn.disabled=true; btn.textContent='Processing…';

    api({ action:'confirmReturn', boardId: b.id, rentalId: b.rentalId,
      renterName: b.renter, staff, condition: retCond, notes })
      .then(() => {
        toast('✅ Board returned and rental closed!','ok');
        setTimeout(()=>location.reload(true), 2000);
      })
      .catch(err => {
        toast('⚠ '+err.message,'err');
        btn.disabled=false; btn.textContent='✅ Confirm Board Returned';
      });
  };
}

// ── SCREEN: KEEPER SCANNER ────────────────────────────────────
// Uses html5-qrcode (same library used in JETZ x Si Nopal activation)
// Scans board QR → navigates to that board's screen
// Also allows photo capture of customer's paper form / passport
function renderScanner() {
  document.getElementById('hdrbadge').textContent = 'Keeper';
  document.getElementById('hdrbadge').style.display = 'block';

  app.innerHTML = `
  <div class="scard">
    <div class="scard-title">📷 Board QR Scanner
      <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:auto">Point camera at board sticker</span>
    </div>

    <div id="qr-reader" style="width:100%;border-radius:12px;overflow:hidden;background:#000;margin-bottom:14px"></div>
    <div id="qr-result" style="display:none;background:#e8f5ec;border-radius:10px;padding:12px 14px;margin-bottom:14px">
      <div style="font-weight:700;color:var(--sea)" id="qr-board-id"></div>
      <div style="font-size:12px;color:#555;margin-top:4px" id="qr-board-info"></div>
      <button class="btn btn-primary btn-sm" style="margin-top:10px;width:100%" onclick="goToBoard()">
        Open Board →
      </button>
    </div>

    <div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px">
      — or manually enter board ID —
    </div>
    <div style="display:flex;gap:8px">
      <input type="text" id="manual-id" placeholder="e.g. ASC-001"
        style="flex:1;text-transform:uppercase;margin-bottom:0">
      <button class="btn btn-primary btn-sm" onclick="goToManual()" style="white-space:nowrap;width:auto;padding:12px 18px">Go →</button>
    </div>
  </div>

  <div class="scard">
    <div class="scard-title">📄 Capture Paper Form / ID
      <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:auto">Optional</span>
    </div>
    <p style="font-size:13px;color:#555;margin-bottom:12px">
      Photograph a customer's hand-written form or passport for record keeping.
      The image is saved as a note in the Activity Log.
    </p>

    <div id="capture-preview" style="display:none;margin-bottom:12px">
      <img id="captured-img" style="width:100%;border-radius:10px;border:2px solid var(--border)">
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <label style="cursor:pointer;margin:0">
        <input type="file" id="camera-capture" accept="image/*" capture="environment"
          style="display:none" onchange="previewCapture(this)">
        <div class="pkg-btn" style="text-align:center;padding:14px">
          <div style="font-size:24px">📸</div>
          <div style="font-size:12px;font-weight:700;margin-top:4px">Take Photo</div>
        </div>
      </label>
      <label style="cursor:pointer;margin:0">
        <input type="file" id="gallery-pick" accept="image/*"
          style="display:none" onchange="previewCapture(this)">
        <div class="pkg-btn" style="text-align:center;padding:14px">
          <div style="font-size:24px">🖼️</div>
          <div style="font-size:12px;font-weight:700;margin-top:4px">From Gallery</div>
        </div>
      </label>
    </div>

    <div id="save-capture-row" style="display:none">
      <input type="text" id="capture-board-id" placeholder="Board ID this relates to (e.g. ASC-001)">
      <input type="text" id="capture-staff" placeholder="Your name">
      <button class="btn btn-primary" onclick="saveCaptureNote()">💾 Save as Activity Note</button>
    </div>
  </div>`;

  // Start QR scanner using html5-qrcode (same lib from JETZ activation)
  let scannedId = '';
  const html5Qr = new Html5Qrcode('qr-reader');
  html5Qr.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 240, height: 240 } },
    (decodedText) => {
      // Extract board ID from URL hash or plain text
      const match = decodedText.match(/#([A-Z0-9-]+)$/i)
        || decodedText.match(/board=([A-Z0-9-]+)/i)
        || [null, decodedText];
      scannedId = (match[1] || '').toUpperCase().trim();
      if (!scannedId) return;

      html5Qr.stop();
      if (navigator.vibrate) navigator.vibrate(60);

      document.getElementById('qr-result').style.display = 'block';
      document.getElementById('qr-board-id').textContent = '✅ Scanned: ' + scannedId;
      document.getElementById('qr-board-info').textContent = 'Tap "Open Board" to proceed';
      document.getElementById('manual-id').value = scannedId;
    },
    () => {}
  ).catch(err => {
    document.getElementById('qr-reader').innerHTML =
      '<div style="padding:20px;text-align:center;color:#fff;font-size:13px">⚠ Camera access denied.<br>Use the manual entry below.</div>';
  });

  window.goToBoard = function() {
    const id = scannedId || document.getElementById('manual-id').value.trim().toUpperCase();
    if (id) window.location.hash = id;
  };

  window.goToManual = function() {
    const id = document.getElementById('manual-id').value.trim().toUpperCase();
    if (id) window.location.hash = id;
    else toast('⚠ Enter a board ID','err');
  };

  window.previewCapture = function(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('captured-img').src = e.target.result;
      document.getElementById('capture-preview').style.display = 'block';
      document.getElementById('save-capture-row').style.display = 'block';
    };
    reader.readAsDataURL(file);
  };

  // Re-attach gallery input since it's a copy
  document.getElementById('gallery-pick').onchange = function() { window.previewCapture(this); };

  window.saveCaptureNote = function() {
    const boardId = document.getElementById('capture-board-id').value.trim().toUpperCase();
    const staff   = document.getElementById('capture-staff').value.trim();
    if (!boardId) { toast('⚠ Enter the board ID','err'); return; }
    if (!staff)   { toast('⚠ Enter your name','err'); return; }
    api({ action:'updateActivity', boardId, boardStatus:'rented',
      location:'', lat:'', lng:'', gpsAccuracy:'', day:'', staff,
      notes:'📄 Paper form / ID photographed by ' + staff,
      condition:'good', renter:'' })
      .then(() => {
        toast('✅ Note saved to Activity Log','ok');
        document.getElementById('save-capture-row').style.display = 'none';
        document.getElementById('capture-preview').style.display = 'none';
      })
      .catch(err => toast('⚠ '+err.message,'err'));
  };
}

// ── SCREEN: OWNER DASHBOARD ───────────────────────────────────
function renderDashboard(data) {
  document.getElementById('hdrbadge').textContent = 'Owner';
  document.getElementById('hdrbadge').style.display = 'block';

  const boards = data.boards || [];
  const counts = data.counts || {};

  const statusColor = {
    available:'#1a7a40', pending_checkout:'#d35400', rented:'#b8860b',
    at_spot:'#1a5276', with_guide:'#1a3a5c', back_camp:'#117a65',
    overdue:'#c0392b', maintenance:'#7d3c98'
  };
  const statusBg = {
    available:'#e8f5ec', pending_checkout:'#fef3e7', rented:'#fffde7',
    at_spot:'#e8f4fd', with_guide:'#eaf2ff', back_camp:'#e8faf5',
    overdue:'#fde8e8', maintenance:'#f5eef8'
  };

  // Build map markers for boards that have GPS
  const gpsBoards = boards.filter(b => b.lat && b.lng);
  const mapCenter = gpsBoards.length > 0
    ? `${gpsBoards[0].lat},${gpsBoards[0].lng}`
    : '-6.842,106.473'; // default Cimaja

  // Build Google Maps embed with all GPS board markers
  let mapMarkersQuery = gpsBoards.map(b =>
    `markers=color:${encodeURIComponent(statusColor[b.status]||'red')}%7Clabel:${b.id.slice(-1)}%7C${b.lat},${b.lng}`
  ).join('&');

  app.innerHTML = `
  <!-- SUMMARY TILES -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
    ${[
      {label:'Available', val:counts.available||0, color:'#1a7a40', bg:'#e8f5ec', icon:'✓'},
      {label:'Out',       val:counts.out||0,       color:'#b8860b', bg:'#fffde7', icon:'🏄'},
      {label:'Overdue',   val:counts.overdue||0,   color:'#c0392b', bg:'#fde8e8', icon:'⚠'},
      {label:'Repair',    val:counts.maintenance||0,color:'#7d3c98',bg:'#f5eef8', icon:'🔧'},
    ].map(t=>`
      <div style="background:${t.bg};border-radius:12px;padding:10px 6px;text-align:center">
        <div style="font-size:20px">${t.icon}</div>
        <div style="font-size:22px;font-weight:700;color:${t.color};line-height:1">${t.val}</div>
        <div style="font-size:10px;color:${t.color};font-weight:600">${t.label}</div>
      </div>`).join('')}
  </div>

  <!-- MAP -->
  <div class="scard" style="padding:0;overflow:hidden;margin-bottom:12px">
    <div style="padding:12px 16px;font-weight:700;font-size:13px;color:var(--sea);
      border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
      🗺️ Live Board Locations
      <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:auto">
        ${gpsBoards.length} of ${boards.length} boards have GPS</span>
    </div>
    ${gpsBoards.length > 0 ? `
    <div style="height:260px;background:#e8f4fd">
      <iframe width="100%" height="260" frameborder="0" style="display:block"
        src="https://maps.google.com/maps?q=${mapCenter}&z=14&output=embed">
      </iframe>
    </div>
    <div style="padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px">
      ${gpsBoards.map(b=>`
        <a href="${b.w3wUrl||'https://maps.google.com/?q='+b.lat+','+b.lng}" target="_blank"
          style="text-decoration:none;background:${statusBg[b.status]||'#f5f5f5'};
          border:1px solid ${statusColor[b.status]||'#ccc'};border-radius:20px;
          padding:4px 10px;font-size:11px;font-weight:700;color:${statusColor[b.status]||'#333'}">
          ${b.id} ${b.w3w ? '📍 '+b.w3w : '📍'}
        </a>`).join('')}
    </div>` : `
    <div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">
      No GPS data yet — guides need to tap 📡 Get GPS when submitting updates.
    </div>`}
  </div>

  <!-- BOARD LIST -->
  <div class="scard">
    <div class="scard-title">📋 All Boards
      <button onclick="window.location.reload()" style="margin-left:auto;border:none;
        background:var(--sand);padding:6px 12px;border-radius:8px;font-size:11px;
        font-weight:700;cursor:pointer;color:var(--sea)">🔄 Refresh</button>
    </div>
    ${boards.map(b => {
      const isOD = b.status === 'overdue';
      const col  = statusColor[b.status] || '#333';
      const bg   = statusBg[b.status]   || '#fff';
      return `
      <div style="border-radius:12px;border:1.5px solid ${col};background:${bg};
        padding:12px 14px;margin-bottom:10px;cursor:pointer"
        onclick="window.location.hash='${b.id}'">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-family:'Playfair Display',serif;font-size:18px;color:var(--sea)">${b.id}</div>
          <div style="background:${col};color:#fff;border-radius:20px;padding:3px 10px;
            font-size:10px;font-weight:700">${STATUS_LABEL[b.status]||b.status}</div>
        </div>
        <div style="font-size:12px;color:#555">${b.size} · ${b.type}</div>
        ${b.renter ? `<div style="font-size:12px;font-weight:600;color:var(--sea);margin-top:4px">
          👤 ${b.renter} · 📞 ${b.phone||'—'}</div>` : ''}
        ${b.location ? `<div style="font-size:11px;color:#888;margin-top:3px">📍 ${b.location}
          ${b.day?' · Day '+b.day:''}</div>` : ''}
        ${b.w3w ? `
        <div style="margin-top:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <a href="${b.w3wUrl||'https://maps.google.com/?q='+encodeURIComponent(b.w3w)}" target="_blank"
            onclick="event.stopPropagation()"
            style="background:#e8f4fd;color:#1a5276;padding:3px 10px;border-radius:12px;
            font-size:11px;font-weight:700;text-decoration:none">📍 ${b.w3w}</a>
          <a href="https://maps.google.com/?q=${b.lat},${b.lng}" target="_blank"
            onclick="event.stopPropagation()"
            style="background:#e8f5ec;color:var(--wave);padding:3px 10px;border-radius:12px;
            font-size:11px;font-weight:700;text-decoration:none">🗺 Maps</a>
          <span style="font-size:10px;color:#bbb">${fmtT(b.gpsTime)}</span>
        </div>` : ''}
        ${b.returnDue ? `<div style="font-size:11px;color:${isOD?'#c0392b':'#888'};margin-top:3px;
          font-weight:${isOD?'700':'400'}">
          🗓 Due: ${fmtDt(b.returnDue)}${isOD?' ⚠ OVERDUE':''}</div>` : ''}
      </div>`;
    }).join('')}
  </div>`;
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3400);
}
</script>
